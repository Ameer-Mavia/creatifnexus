<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- PRIMARY SEO -->
    <title>Creatif Nexus — AI-Powered Design, Development & Brand Strategy Agency</title>
    <meta name="description" content="Creatif Nexus is a boutique creative agency specialising in AI automation, brand identity, web development and growth strategy. We build digital products that define categories." />
    <meta name="keywords" content="AI agency, AI automation agency, brand identity design, web development agency, custom chatbot development, AI solutions, digital agency, creative agency" />
    <meta name="author" content="Creatif Nexus" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://creatifnexus.vercel.app/" />

    <!-- OPEN GRAPH -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://creatifnexus.vercel.app/" />
    <meta property="og:site_name" content="Creatif Nexus" />
    <meta property="og:title" content="Creatif Nexus — Intelligence by Design" />
    <meta property="og:description" content="We bridge human creativity with machine intelligence. Sharp strategy, premium design, robust engineering, and AI automation that actually works." />
    <meta property="og:image" content="https://creatifnexus.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Creatif Nexus — AI-Powered Creative Agency" />
    <meta property="og:locale" content="en_US" />

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@creatifnexus" />
    <meta name="twitter:title" content="Creatif Nexus — Intelligence by Design" />
    <meta name="twitter:description" content="We bridge human creativity with machine intelligence. Sharp strategy, premium design, robust engineering, and AI automation that actually works." />
    <meta name="twitter:image" content="https://creatifnexus.vercel.app/og-image.jpg" />

    <!-- JSON-LD STRUCTURED DATA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://creatifnexus.vercel.app/#organization",
          "name": "Creatif Nexus",
          "url": "https://creatifnexus.vercel.app/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://creatifnexus.vercel.app/favicon.svg",
            "width": 180,
            "height": 180
          },
          "description": "Boutique creative agency specialising in AI automation, brand identity, web development and growth strategy.",
          "foundingDate": "2020",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "hello@creatifnexus.com",
            "contactType": "customer service",
            "availableLanguage": ["English"]
          },
          "sameAs": [
            "https://twitter.com/creatifnexus",
            "https://linkedin.com/company/creatifnexus",
            "https://instagram.com/creatifnexus"
          ],
          "knowsAbout": [
            "Artificial Intelligence",
            "Brand Identity",
            "Web Development",
            "Marketing Strategy",
            "AI Automation",
            "UI/UX Design"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://creatifnexus.vercel.app/#website",
          "url": "https://creatifnexus.vercel.app/",
          "name": "Creatif Nexus",
          "description": "AI-Powered Design, Development & Brand Strategy Agency",
          "publisher": { "@id": "https://creatifnexus.vercel.app/#organization" },
          "inLanguage": "en-US"
        },
        {
          "@type": "ProfessionalService",
          "@id": "https://creatifnexus.vercel.app/#service",
          "name": "Creatif Nexus",
          "url": "https://creatifnexus.vercel.app/",
          "priceRange": "$$$$",
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Agency Services",
            "itemListElement": [
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Solutions & Automation", "description": "Custom chatbots, AI sales agents, and intelligent process automation." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Brand Identity & Design", "description": "UI/UX design, brand identity systems, and visual design." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Web & App Development", "description": "Full-stack web applications, e-commerce, and custom platforms." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Marketing Strategy", "description": "Growth strategy, SEO, SEM, and brand campaigns." } }
            ]
          }
        }
      ]
    }
    </script>

    <!-- FAVICON + THEME -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1a1208" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
